<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusOS - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00ff88">
</head>
<body>
    <div id="connection-pill" class="status-pill">● Online</div>

    <div class="auth-container">
        <div class="card auth-card">
            <h2>FocusOS</h2>
            <p style="text-align: center; color: var(--text-muted);">Welcome back. Enter your credentials.</p>
            
            <div id="error-msg" style="color: var(--accent-red); margin-bottom: 10px; text-align: center;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="/register">Register</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            
            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('error-msg').textContent = data.message;
            }
        });

        // Online/Offline status
        const pill = document.getElementById('connection-pill');
        function updateStatus() {
            if (navigator.onLine) {
                pill.textContent = '● Online';
                pill.className = 'status-pill online';
            } else {
                pill.textContent = '● Offline';
                pill.className = 'status-pill offline';
            }
        }
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
